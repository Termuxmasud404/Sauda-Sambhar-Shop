<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel | Sauda Sambhar Shop</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>
<body>

<header>

<div class="logo">
🛒 <span>Sauda Sambhar Shop</span>
</div>

<nav>
<a href="index.html">Home</a>
<button onclick="logout()">Logout</button>
</nav>

</header>

<div class="admin-container">

<h1>👨‍💼 Admin Dashboard</h1>

<form id="productForm">

<input
type="text"
id="name"
placeholder="Product Name"
required>

<input
type="number"
id="price"
placeholder="Product Price"
required>

<textarea
id="description"
placeholder="Product Description"></textarea>

<label class="upload-box">

<i class="fa-solid fa-image"></i>

Choose Product Image

<input
type="file"
id="imageFile"
accept="image/*"
required
hidden>

</label>

<img
id="preview"
src=""
style="display:none;width:150px;border-radius:10px;margin:15px 0;">

<button type="submit">

<i class="fa-solid fa-plus"></i>

Add Product

</button>

</form>

<hr>

<h2>All Products</h2>

<div id="products">

<!-- Firebase Products -->

</div>

</div>

<script>
const file=document.getElementById("imageFile");
const preview=document.getElementById("preview");

file.addEventListener("change",()=>{

const img=file.files[0];

if(img){

preview.src=URL.createObjectURL(img);

preview.style.display="block";

}

});
</script>

<script type="module" src="js/admin.js"></script>

</body>
</html>
